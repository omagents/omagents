name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # Node 24 ships with npm >= 11.5.1, which supports OIDC trusted publishing.
          node-version: '24'
          package-manager-cache: false
        # Don't set registry-url here: it writes an .npmrc with a placeholder
        # NODE_AUTH_TOKEN, which prevents npm from using OIDC trusted publishing.

      - run: npm ci

      - name: Check plugin syntax
        run: |
          node --check .opencode/plugins/index.js
          node --check .opencode/plugins/parallel.js

      - run: npm publish --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --verify-tag
